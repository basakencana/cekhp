<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MySite</title>

<style>

/* RESET */
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, sans-serif;
}

/* BACKGROUND */
body{
height:100vh;
background:linear-gradient(135deg,#0f172a,#1e3a8a);
color:white;
}

/* NAVBAR */
nav{
position:fixed;
top:0;
width:100%;
display:flex;
justify-content:space-between;
padding:20px 50px;
background:rgba(0,0,0,0.4);
backdrop-filter:blur(10px);
}

nav a{
color:white;
text-decoration:none;
margin-left:20px;
}

/* HERO */
.hero{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
}

/* CARD */
.card{
background:rgba(255,255,255,0.15);
backdrop-filter:blur(15px);
padding:40px;
border-radius:15px;
}

/* BUTTON */
.btn{
background:#3b82f6;
padding:14px 28px;
border-radius:30px;
color:white;
text-decoration:none;
display:inline-block;
margin-top:20px;
transition:0.3s;
}

.btn:hover{
transform:scale(1.1);
background:#2563eb;
}

/* ANIMATION */
.fade-up{
opacity:0;
transform:translateY(40px);
animation:fadeUp 1s forwards;
}

.delay{ animation-delay:0.4s; }
.delay2{ animation-delay:0.8s; }

@keyframes fadeUp{
to{
opacity:1;
transform:translateY(0);
}
}

</style>
</head>

<body>

<!-- NAVBAR -->
<nav>
<div><b>MySite</b></div>
<div>
<a href="#">Home</a>
<a href="#">About</a>
<a href="#">Contact</a>
</div>
</nav>

<!-- HERO -->
<section class="hero">
<div class="card">
<h1 class="fade-up">Welcome to MySite 🚀</h1>
<p class="fade-up delay">
Professional modern website running from your own server.
<p id="device" class="fade-up delay2"></p>
</p>
<a href="#" class="btn fade-up delay2">Explore Now</a>
<button class="btn" onclick="getLocation()">
📍 Detect My Location
</button>

<p id="locationResult" style="margin-top:15px;"></p>
<div id="map" style="margin-top:20px;"></div>
</div>
</section>
<script>
const deviceText = document.getElementById("device");

const ua = navigator.userAgent;

let device = "Desktop 💻";
let os = "Unknown OS";
let browser = "Unknown Browser";

/* DEVICE */
if (/Android/i.test(ua)) device = "Android 📱";
else if (/iPhone|iPad/i.test(ua)) device = "iPhone 📱";

/* OS */
if (ua.indexOf("Win") != -1) os = "Windows";
else if (ua.indexOf("Linux") != -1) os = "Linux";
else if (ua.indexOf("Mac") != -1) os = "MacOS";

/* BROWSER */
if (ua.indexOf("Chrome") != -1) browser = "Chrome";
if (ua.indexOf("Firefox") != -1) browser = "Firefox";
if (ua.indexOf("Safari") != -1) browser = "Safari";

deviceText.innerHTML =
`Device: ${device}<br>OS: ${os}<br>Browser: ${browser}`;
</script>
<script>
function getLocation() {

    const result = document.getElementById("locationResult");
    const map = document.getElementById("map");

    if (!navigator.geolocation) {
        result.innerHTML = "Geolocation not supported.";
        return;
    }

    result.innerHTML = "Getting location...";

    navigator.geolocation.getCurrentPosition(
        function(position) {

            const lat = position.coords.latitude;
            const lon = position.coords.longitude;

            result.innerHTML =
            "✅ Location detected";

            /* GOOGLE MAP EMBED */
            map.innerHTML =
            `<iframe
                width="100%"
                height="300"
                style="border-radius:15px;border:none;"
                loading="lazy"
                src="https://maps.google.com/maps?q=${lat},${lon}&z=15&output=embed">
            </iframe>`;
        },

        function() {
            result.innerHTML = "❌ Permission denied.";
        }
    );
}
</script>
</body>
</html>
